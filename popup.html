<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Lexi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 200px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #191f28;
      line-height: 1.4;
    }

    .header h1 { font-size: 14px; font-weight: 600; }
    .header p  { font-size: 11px; color: #8b95a1; margin-top: 2px; }

    .tip-card {
      margin-top: 14px;
      padding: 8px 10px;
      background: #fffbe6;
      border-radius: 8px;
    }

    .tip-title {
      font-size: 10px;
      font-weight: 600;
      color: #b8860b;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .tip-content { font-size: 11px; color: #6b7684; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lexi</h1>
    <p>드래그로 빠르게 번역하세요</p>
  </div>

  <div class="tip-card">
    <div class="tip-title">💡 Tip</div>
    <div class="tip-content">단어나 짧은 구문을 드래그하면 한국어 번역이 나타납니다</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
